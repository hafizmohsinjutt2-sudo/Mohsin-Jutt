<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, "fetch", {
            get: function() { return _fetch; },
            set: function(v) { console.warn("Blocked attempt to overwrite fetch"); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If we can't redefine it, we hope it's already protected
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
